    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      background: #f8f9fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container { max-width: 480px; text-align: center; }
    .code {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .title { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .desc { font-size: 0.875rem; color: #6b7280; margin-bottom: 2rem; }
    .path {
      font-family: monospace;
      font-size: 0.75rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0.5rem;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.8125rem;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .link:hover {
      border-color: #2563eb;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
    }
    .link svg { width: 20px; height: 20px; color: #6b7280; }
    .link:hover svg { color: #2563eb; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #2563eb;
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    @media (max-width: 480px) {
      .links { grid-template-columns: repeat(2, 1fr); }
      .code { font-size: 4rem; }
    }
