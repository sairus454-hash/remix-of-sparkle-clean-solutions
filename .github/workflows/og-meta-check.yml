name: OG / Twitter meta check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/components/SEO.tsx'
      - 'src/pages/**'
      - 'public/og-*'
      - 'scripts/check-og-meta.mjs'
      - '.github/workflows/og-meta-check.yml'

jobs:
  check-og-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run OG/Twitter Card static check
        run: node scripts/check-og-meta.mjs
